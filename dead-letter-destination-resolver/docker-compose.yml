---
services:
  broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: broker
    container_name: broker
    networks:
      - spring-kafka-streams-dead-letter-queue
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      # Replace CLUSTER_ID with a unique base64 UUID using "bin/kafka-storage.sh random-uuid"
      # See https://docs.confluent.io/kafka/operations-tools/kafka-tools.html#kafka-storage-sh
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  control-center:
    image: confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    hostname: control-center
    container_name: control-center
    networks:
      - spring-kafka-streams-dead-letter-queue
    depends_on:
      - broker
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:29092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      CONTROL_CENTER_MODE_ENABLE: "management"
      PORT: 9021

  init-kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: init-kafka
    container_name: init-kafka
    networks:
      - spring-kafka-streams-dead-letter-queue
    depends_on:
      - broker
    entrypoint: ['/bin/bash', '-c']
    command: |
      'cub kafka-ready -b broker:29092 1 300 && \
      kafka-topics --bootstrap-server broker:29092 --create --topic delivery-booked-topic'

  spring-kafka-streams-dead-letter-destination-resolver:
    image: michelin/spring-kafka-streams-dead-letter-queue:dead-letter-destination-resolver-1.0.0
    hostname: spring-kafka-streams-dead-letter-destination-resolver
    container_name: spring-kafka-streams-dead-letter-destination-resolver
    networks:
      - spring-kafka-streams-dead-letter-queue
    depends_on:
      - init-kafka
    restart: unless-stopped
    environment:
      BOOTSTRAP_SERVERS: 'broker:29092'

networks:
  spring-kafka-streams-dead-letter-queue:
    driver: bridge
